name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore: ["README.md"]
  pull_request:
    branches: [main]
    paths-ignore: ["README.md"]
  release:
    types: [published]

jobs:
  macos-arm64:
    runs-on: macos-14
    permissions:
      contents: read
      actions: write

    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'pdx-bundles',
            });
            for (const artifact of artifacts) {
              if (artifact.workflow_run.id !== context.runId) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                console.log(`Deleted old artifact: ${artifact.name} (run ${artifact.workflow_run.id})`);
              }
            }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Playdate SDK
        run: |
          curl -sL "https://download-cdn.panic.com/playdate_sdk/PlaydateSDK-latest.zip" -o "$RUNNER_TEMP/PlaydateSDK.zip"
          unzip -q "$RUNNER_TEMP/PlaydateSDK.zip" -d "$RUNNER_TEMP"
          sudo installer -pkg "$RUNNER_TEMP/PlaydateSDK.pkg" -target /
          echo "PLAYDATE_SDK_PATH=$HOME/Developer/PlaydateSDK" >> "$GITHUB_ENV"

      - name: Run install.sh
        run: |
          CI=1 bash install.sh

      - name: Add paths
        run: |
          GOBIN="$(go env GOPATH)/bin"
          echo "$GOBIN" >> "$GITHUB_PATH"
          echo "$HOME/tinygo-playdate/bin" >> "$GITHUB_PATH"

      - name: Unit tests
        run: |
          cd cmd/pdgoc
          go test ./config/... ./pdxinfo/... -v

      - name: Build game examples
        run: |
          cd game_examples
          bash build_all.sh

      - name: Build tour_of_go examples
        run: |
          cd tour_of_go
          bash build_all.sh

      - name: Simulator test — hello_world
        run: |
          cd game_examples/hello_world
          pdgoc -sim \
            -name HelloWorld \
            -author ci \
            -desc test \
            -bundle-id com.test.hw \
            -version 1.0 \
            -build-number 1
          "$PLAYDATE_SDK_PATH/bin/Playdate Simulator.app/Contents/MacOS/Playdate Simulator" \
            "$PWD/HelloWorld_sim.pdx" &
          SIM_PID=$!
          sleep 5
          if kill -0 $SIM_PID 2>/dev/null; then
            echo "Simulator launched OK"
            kill $SIM_PID 2>/dev/null || true
          else
            echo "Simulator failed to launch"
            exit 1
          fi

      - name: Simulator test — generics_all
        run: |
          cd tour_of_go/generics_all
          pdgoc -sim \
            -name TourOfGoGenericsAll \
            -author ci \
            -desc test \
            -bundle-id com.test.tog-generics \
            -version 1.0 \
            -build-number 1
          "$PLAYDATE_SDK_PATH/bin/Playdate Simulator.app/Contents/MacOS/Playdate Simulator" \
            "$PWD/TourOfGoGenericsAll_sim.pdx" &
          SIM_PID=$!
          sleep 5
          if kill -0 $SIM_PID 2>/dev/null; then
            echo "Simulator launched OK"
            kill $SIM_PID 2>/dev/null || true
          else
            echo "Simulator failed to launch"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdx-bundles-macos
          overwrite: true
          path: |
            game_examples/**/*.pdx
            tour_of_go/**/*.pdx

  linux-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install ARM toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Playdate SDK
        run: |
          curl -sL "https://download.panic.com/playdate_sdk/Linux/PlaydateSDK-latest.tar.gz" | tar xz -C "$RUNNER_TEMP"
          SDK_DIR=$(ls -d "$RUNNER_TEMP/PlaydateSDK-"* | head -1)
          echo "PLAYDATE_SDK_PATH=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Run install.sh
        run: CI=1 bash install.sh

      - name: Add paths
        run: |
          GOBIN="$(go env GOPATH)/bin"
          echo "$GOBIN" >> "$GITHUB_PATH"
          echo "$HOME/tinygo-playdate/bin" >> "$GITHUB_PATH"

      - name: Unit tests
        run: |
          cd cmd/pdgoc
          go test ./config/... ./pdxinfo/... -v

      - name: Build game examples
        run: |
          cd game_examples
          bash build_all.sh

      - name: Build tour_of_go examples
        run: |
          cd tour_of_go
          bash build_all.sh

      - name: Simulator test — hello_world
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb libwebkit2gtk-4.1-0 libpulse0 pipewire pipewire-pulse pulseaudio-utils
          pipewire -d &
          sleep 1
          pactl load-module module-null-sink sink_name=dummy
          cd game_examples/hello_world
          pdgoc -sim \
            -name HelloWorld \
            -author ci \
            -desc test \
            -bundle-id com.test.hw \
            -version 1.0 \
            -build-number 1
          xvfb-run "$PLAYDATE_SDK_PATH/bin/PlaydateSimulator" \
            "$PWD/HelloWorld_sim.pdx" &
          SIM_PID=$!
          sleep 5
          if kill -0 $SIM_PID 2>/dev/null; then
            echo "Simulator launched OK"
            kill $SIM_PID 2>/dev/null || true
          else
            echo "Simulator failed to launch"
            exit 1
          fi
